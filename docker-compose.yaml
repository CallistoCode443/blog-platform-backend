services:
  postgres:
    image: postgres:17
    container_name: blogplatform-db
    environment:
      - POSTGRES_DB=blogplatform
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "8080:80"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogplatform"]
      interval: 1m30s
      timeout: 30s
      retries: 5

volumes:
  postgres_data: