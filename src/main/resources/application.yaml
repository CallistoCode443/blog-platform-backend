spring:
  application:
    name: blogplatform
  datasource:
    url: jdbc:postgresql://localhost:5433/blogplatform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate: org.hibernate.dialect.PostgreSQLDialect
      format-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
